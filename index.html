<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>calendar</title>
		<link rel="stylesheet" href="table.css">
	</head>
	<body>
        <main>
            <h1>我的日历</h1>
            <div class="calendar-controls">
                <button type="button" id="prev-year"><</button>
                <label class="control-group">
                    <input type="number" id="calendar-year-input" min="1" max="9999" step="1">
                    <span>年</span>
                </label>
                <button type="button" id="next-year">></button>
                <button type="button" id="prev-month"><</button>
                <label class="control-group">
                    <input type="number" id="calendar-month-input" min="1" max="12" step="1">
					<span>月</span>
                </label>
                <button type="button" id="next-month">></button>
                <button type="button" id="today-button">今天</button>
            </div>
            <table class="main-table">
				<thead>
					<!-- 星期表头，weekend 表示周末 -->
					<tr>
						<th id="th1">一</th>
						<th id="th2">二</th>
						<th id="th3">三</th>
						<th id="th4">四</th>
						<th id="th5">五</th>
						<th id="th6" class="weekend">六</th>
						<th id="th7" class="weekend">日</th>
					</tr>
				</thead>
				<!-- tbody 先留空，日期由 JS 按规则生成 -->
				<tbody id="calendar-body">
				</tbody>
			</table>
		</main>
		<script src="table.js"></script>
	</body>
</html>
