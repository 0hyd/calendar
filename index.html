<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>calendar</title>
		<link rel="stylesheet" href="./styles/main.css">
		<link rel="stylesheet" href="./styles/timeInput.css">
		<link rel="stylesheet" href="./styles/grid.css">
		<link rel="stylesheet" href="./styles/festivals.css">
	</head>
	<body>
        <main>
            <h1>我的日历</h1>
            <div id="calendar-controls">
				<div id="year-month-row">
					<div class="start-time">
						<button type="button" id="add-year">▲</button>
						<button type="button" id="decrease-year">▼</button>
					</div>
					<label class="control-group">
						<input type="number" id="calendar-year-input" min="1" max="9999" step="1">
						<span>年</span>
					</label>
					<div class="start-time">
						<button type="button" id="add-month">▲</button>
						<button type="button" id="decrease-month">▼</button>
					</div>
					<label class="control-group">
						<input type="number" id="calendar-month-input" min="1" max="12" step="1">
						<span>月</span>
					</label>
				</div>
                <button type="button" id="today-button">今天</button>
            </div>
            <div id="calendar">
				<div id="calendar-header">
					<div class="weekday" data-column="0">一</div>
					<div class="weekday" data-column="1">二</div>
					<div class="weekday" data-column="2">三</div>
					<div class="weekday" data-column="3">四</div>
					<div class="weekday" data-column="4">五</div>
					<div class="weekday weekend" data-column="5">六</div>
					<div class="weekday weekend" data-column="6">日</div>
				</div>

				<div id="calendar-grid">
				</div>
			</div>
		</main>
		<script src="./scripts/festivals.js"></script>
		<script src="./scripts/writeCalendar.js"></script>
		<script src="./scripts/renderCalendar.js"></script>
		<script src="./scripts/controlTime.js"></script>
	</body>
</html>
