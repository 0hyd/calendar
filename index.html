<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>calendar</title>
		<link rel="stylesheet" href="./styles/main.css">
		<link rel="stylesheet" href="./styles/timeInput.css">
		<link rel="stylesheet" href="./styles/grid.css">
		<link rel="stylesheet" href="./styles/festivals.css">
	</head>
	<body>
        <main>
            <h1>我的日历</h1>
            <div class="calendar-controls">
                <label class="control-group">
                    <input type="number" id="calendar-year-input" min="1" max="9999" step="1">
                    <span>年</span>
                </label>
                <label class="control-group">
                    <input type="number" id="calendar-month-input" min="0" max="13" step="1">
					<span>月</span>
                </label>
                <button type="button" id="today-button">今天</button>
            </div>
            <div id="calendar">
				<div id="calendar-header">
					<div class="weekday">一</div>
					<div class="weekday">二</div>
					<div class="weekday">三</div>
					<div class="weekday">四</div>
					<div class="weekday">五</div>
					<div class="weekday weekend">六</div>
					<div class="weekday weekend">日</div>
				</div>

				<div id="calendar-grid">
				</div>
			</div>
		</main>
		<script src="./scripts/festivals.js"></script>
		<script src="./scripts/table.js"></script>
	</body>
</html>
