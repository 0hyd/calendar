<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>calendar</title>
		<link rel="stylesheet" href="./styles/main.css">
		<link rel="stylesheet" href="./styles/table.css">
		<link rel="stylesheet" href="./styles/timeInput.css">
	</head>
	<body>
        <main>
            <h1>我的日历</h1>
            <div class="calendar-controls">
                <label class="control-group">
                    <input type="number" id="calendar-year-input" min="1" max="9999" step="1">
                    <span>年</span>
                </label>
                <label class="control-group">
                    <input type="number" id="calendar-month-input" min="1" max="12" step="1">
					<span>月</span>
                </label>
                <button type="button" id="today-button">今天</button>
            </div>
            <table class="main-table">
				<thead>
					<!-- 星期表头，weekend 表示周末 -->
					<tr>
						<th id="th1" class="week-number">一</th>
						<th id="th2" class="week-number">二</th>
						<th id="th3" class="week-number">三</th>
						<th id="th4" class="week-number">四</th>
						<th id="th5" class="week-number">五</th>
						<th id="th6" class="weekend-h, week-number">六</th>
						<th id="th7" class="weekend-h, week-number">日</th>
					</tr>
				</thead>
				<!-- tbody 先留空，日期由 JS 按规则生成 -->
				<tbody id="calendar-body">
				</tbody>
			</table>
		</main>
		<script src="./scripts/festivals.js"></script>
		<script src="./scripts/table.js"></script>
	</body>
</html>
